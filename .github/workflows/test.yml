name: test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  portable:
    name: portable Rust and Unicode conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Workspace tests
        run: cargo test --workspace --all-features
      - name: Download pinned Unicode conformance data
        run: scripts/fetch_unicode_conformance.sh
      - name: Unicode conformance
        env:
          SKIA_UNICODE_CONFORMANCE_DIR: target/unicode-conformance
        run: cargo test -p skia-text --test unicode_conformance -- --ignored

  vulkan-lavapipe:
    name: Vulkan (Lavapipe + validation)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install software Vulkan and validation layers
        run: |
          sudo apt-get update
          sudo apt-get install --yes mesa-vulkan-drivers vulkan-tools vulkan-validationlayers
      - name: Select Lavapipe ICD
        run: |
          icd="$(find /usr/share/vulkan/icd.d -maxdepth 1 -name 'lvp_icd*.json' -print -quit)"
          test -n "$icd"
          echo "VK_DRIVER_FILES=$icd" >> "$GITHUB_ENV"
          echo "VK_ICD_FILENAMES=$icd" >> "$GITHUB_ENV"
      - name: Inspect Vulkan runtime
        run: vulkaninfo --summary
      - name: Vulkan tests
        env:
          SKIA_REQUIRE_VULKAN_DEVICE: "1"
          SKIA_VULKAN_VALIDATION: "1"
        run: cargo test -p skia-vulkan -- --nocapture --test-threads=1

  metal-optional:
    name: macOS Metal (device optional)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Metal tests
        run: cargo test -p skia-metal -p skia-gpu-text
